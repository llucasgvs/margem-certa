<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Margem Certa</title>
<meta name="robots" content="noindex, nofollow">

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --green:#00C853; --green-light:#E8FAF0; --green-mid:#00A846;
  --bg:#FAFAF9; --surface:#FFFFFF; --dark:#0F1410;
  --text:#1A1F1B; --muted:#6B7A6D; --border:#E4E9E5;
  --red:#E53E3E; --red-light:#FFF5F5;
  --font:'Plus Jakarta Sans',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

nav{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;}
nav .inner{max-width:1140px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;}
.logo{font-weight:800;font-size:18px;color:var(--text);text-decoration:none;letter-spacing:-.5px;}
.logo em{color:var(--green);font-style:normal;}
.nav-back{font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:5px;transition:color .2s;}
.nav-back:hover{color:var(--text);}

main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}

.auth-wrap{width:100%;max-width:420px;}

.auth-card{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.06);animation:popIn .4s ease;}
@keyframes popIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* TABS */
.auth-tabs{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border);}
.auth-tab{padding:16px;text-align:center;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s;border:none;background:none;font-family:var(--font);}
.auth-tab.active{color:var(--text);background:var(--surface);border-bottom:2px solid var(--green);margin-bottom:-1px;}
.auth-tab:not(.active){background:var(--bg);}

/* FORMS */
.auth-body{padding:28px 24px;}
.auth-form{display:none;}
.auth-form.active{display:flex;flex-direction:column;gap:14px;}

.auth-title{font-size:20px;font-weight:800;letter-spacing:-.6px;margin-bottom:4px;}
.auth-sub{font-size:13px;color:var(--muted);margin-bottom:8px;line-height:1.6;}

.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
.field input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:13px 14px;color:var(--text);font-size:15px;font-family:var(--font);font-weight:500;transition:border-color .2s;}
.field input:focus{outline:none;border-color:var(--green);background:#fff;}
.field input::placeholder{color:#BFC9C1;font-weight:400;}

.auth-btn{width:100%;background:var(--green);color:#fff;border:none;padding:15px;border-radius:12px;font-size:15px;font-weight:800;font-family:var(--font);cursor:pointer;transition:background .2s,transform .15s;letter-spacing:-.3px;margin-top:4px;}
.auth-btn:active{transform:scale(.98);}
.auth-btn:disabled{background:var(--border);cursor:not-allowed;}

.auth-note{font-size:11px;color:var(--muted);text-align:center;line-height:1.6;}
.auth-note a{color:var(--green-mid);text-decoration:none;font-weight:600;}

/* MENSAGENS */
.msg{border-radius:10px;padding:12px 14px;font-size:13px;font-weight:600;display:none;}
.msg.success{background:var(--green-light);color:var(--green-mid);}
.msg.error{background:var(--red-light);color:var(--red);}
.msg.show{display:block;}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:12px;margin:4px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-size:12px;color:var(--muted);}

footer{padding:20px;text-align:center;font-size:12px;color:var(--muted);}
</style>
</head>
<body>

<nav>
  <div class="inner">
    <a href="/" class="logo">Margem<em>Certa</em></a>
    <a href="/" class="nav-back">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Voltar
    </a>
  </div>
</nav>

<main>
  <div class="auth-wrap">
    <div class="auth-card">

      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('cadastro')">Criar conta</button>
        <button class="auth-tab" onclick="switchTab('login')">Entrar</button>
      </div>

      <div class="auth-body">

        <!-- CADASTRO -->
        <form class="auth-form active" id="form-cadastro" onsubmit="cadastrar(event)">
          <div>
            <div class="auth-title">Crie sua conta grátis</div>
            <div class="auth-sub">Sem cartão de crédito. Cancele quando quiser.</div>
          </div>
          <div class="field">
            <label>Nome</label>
            <input type="text" id="cadastro-nome" placeholder="Seu nome" autocomplete="given-name" required>
          </div>
          <div class="field">
            <label>E-mail</label>
            <input type="email" id="cadastro-email" placeholder="seu@email.com" autocomplete="email" required>
          </div>
          <div class="field">
            <label>Senha</label>
            <input type="password" id="cadastro-senha" placeholder="Mínimo 6 caracteres" autocomplete="new-password" minlength="6" required>
          </div>
          <div class="msg" id="msg-cadastro"></div>
          <button type="submit" class="auth-btn" id="btn-cadastro">Criar conta grátis →</button>
          <p class="auth-note">Ao criar conta você concorda com nossos termos de uso.</p>
        </form>

        <!-- LOGIN -->
        <form class="auth-form" id="form-login" onsubmit="login(event)">
          <div>
            <div class="auth-title">Bem-vindo de volta</div>
            <div class="auth-sub">Entre com seu e-mail e senha.</div>
          </div>
          <div class="field">
            <label>E-mail</label>
            <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email" required>
          </div>
          <div class="field">
            <label>Senha</label>
            <input type="password" id="login-senha" placeholder="Sua senha" autocomplete="current-password" required>
          </div>
          <div class="msg" id="msg-login"></div>
          <button type="submit" class="auth-btn" id="btn-login">Entrar →</button>
          <div class="divider"><span>ou</span></div>
          <button type="button" class="auth-btn" id="btn-magic" onclick="magicLink()" style="background:var(--bg);color:var(--text);border:1.5px solid var(--border);">Entrar sem senha (link por e-mail)</button>
          <div class="msg" id="msg-magic"></div>
          <p class="auth-note"><a href="#" onclick="esqueceuSenha()">Esqueceu a senha?</a></p>
        </form>

      </div>
    </div>
  </div>
</main>

<footer>Margem<strong style="color:var(--green)">Certa</strong> · Feito para vendedores 🇧🇷</footer>

<script>
const SUPABASE_URL = 'https://waxilknycqamitspnbcl.supabase.co'
const SUPABASE_KEY = 'sb_publishable_RYARUBT9zaE8uRNGrRlJCA_BIYJ1wd8'
const { createClient } = supabase
const sb = createClient(SUPABASE_URL, SUPABASE_KEY)
const params = new URLSearchParams(window.location.search)
if (params.get('tab') === 'login') switchTab('login')

// Redireciona se já está logado
sb.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = '/app'
})

function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'cadastro') || (i === 1 && tab === 'login'))
  })
  document.getElementById('form-cadastro').classList.toggle('active', tab === 'cadastro')
  document.getElementById('form-login').classList.toggle('active', tab === 'login')
}

function showMsg(id, tipo, texto) {
  const el = document.getElementById(id)
  el.className = `msg ${tipo} show`
  el.textContent = texto
}

function hideMsg(id) {
  document.getElementById(id).className = 'msg'
}

async function cadastrar(e) {
  e.preventDefault()
  const nome  = document.getElementById('cadastro-nome').value.trim()
  const email = document.getElementById('cadastro-email').value.trim()
  const senha = document.getElementById('cadastro-senha').value
  const btn   = document.getElementById('btn-cadastro')

  btn.disabled = true
  btn.textContent = 'Criando conta...'
  hideMsg('msg-cadastro')

  const { error } = await sb.auth.signUp({
    email,
    password: senha,
    options: {
      data: { nome },
      emailRedirectTo: params.get('plano') === 'pro'
        ? 'https://margem-certa.vercel.app/app?plano=pro'
        : 'https://margem-certa.vercel.app/app'
    }
  })

  if (error) {
    showMsg('msg-cadastro', 'error', traduzirErro(error.message))
    btn.disabled = false
    btn.textContent = 'Criar conta grátis →'
    return
  }

  showMsg('msg-cadastro', 'success', 'Conta criada! Verifique seu e-mail para confirmar o cadastro.')
  btn.textContent = 'E-mail enviado ✓'
  gtag('event', 'cadastro_realizado', { event_category: 'conversao' })
  if (params.get('plano') === 'pro') {
    showMsg('msg-cadastro', 'success', 'Conta criada! Após confirmar o e-mail, você será direcionado para o pagamento.')
  }
}

async function login(e) {
  e.preventDefault()
  const email = document.getElementById('login-email').value.trim()
  const senha = document.getElementById('login-senha').value
  const btn   = document.getElementById('btn-login')

  btn.disabled = true
  btn.textContent = 'Entrando...'
  hideMsg('msg-login')

  const { error } = await sb.auth.signInWithPassword({ email, password: senha })

  if (error) {
    showMsg('msg-login', 'error', traduzirErro(error.message))
    btn.disabled = false
    btn.textContent = 'Entrar →'
    return
  }

  window.location.href = '/app'
}

async function magicLink() {
  const email = document.getElementById('login-email').value.trim()
  if (!email) {
    showMsg('msg-magic', 'error', 'Digite seu e-mail primeiro.')
    return
  }
  const btn = document.getElementById('btn-magic')
  btn.disabled = true
  btn.textContent = 'Enviando link...'
  hideMsg('msg-magic')

  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: 'https://margem-certa.vercel.app/app' }
  })

  if (error) {
    showMsg('msg-magic', 'error', traduzirErro(error.message))
    btn.disabled = false
    btn.textContent = 'Entrar sem senha (link por e-mail)'
    return
  }

  showMsg('msg-magic', 'success', 'Link enviado! Verifique seu e-mail.')
  btn.textContent = 'Link enviado ✓'
}

async function esqueceuSenha() {
  const email = document.getElementById('login-email').value.trim()
  if (!email) {
    showMsg('msg-login', 'error', 'Digite seu e-mail primeiro.')
    return
  }
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://margem-certa.vercel.app/app/reset-senha'
  })
  if (error) {
    showMsg('msg-login', 'error', traduzirErro(error.message))
  } else {
    showMsg('msg-login', 'success', 'Link de redefinição enviado para seu e-mail.')
  }
}

function traduzirErro(msg) {
  if (msg.includes('Invalid login')) return 'E-mail ou senha incorretos.'
  if (msg.includes('Email not confirmed')) return 'Confirme seu e-mail antes de entrar.'
  if (msg.includes('already registered')) return 'Este e-mail já está cadastrado. Tente entrar.'
  if (msg.includes('Password should be')) return 'A senha deve ter pelo menos 6 caracteres.'
  if (msg.includes('rate limit')) return 'Muitas tentativas. Aguarde alguns minutos.'
  return 'Erro inesperado. Tente novamente.'
}
</script>
</body>
</html>
